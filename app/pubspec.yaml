name: agenttalk
description: AI 카톡형 도트 컴패니언 (프로토타입)
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.0
  # 3D 방 POC (실사화 — three.js Dart 포팅) + glTF 로더
  three_js: ^0.3.0
  three_js_advanced_loaders: ^0.3.0
  three_js_postprocessing: ^0.3.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    # 노아의 방 무대용 누끼(투명 PNG) — 방을 돌아다니는 캐릭터.
    - assets/character/noa_cut.png
    # 정적 아바타(폴백·향후 사용).
    - assets/character/noa.jpg
    # 방 가구 스프라이트(디테일 카툰). _raw/ 는 생성 원본이라 번들 제외(하위 폴더는 미포함).
    - assets/room/
    # 3D 방 가구 모델(Kenney Furniture Kit, CC0)
    - assets/room3d/
