name: agenttalk
description: AI 카톡형 도트 컴패니언 (프로토타입)
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    # 플레이스홀더 도트(scripts/gen_placeholder_noa.py 생성). 진짜 sprite-gen 아트로 교체 예정.
    - assets/sprites/noa/manifest.json
    - assets/sprites/noa/sprite-sheet-alpha.png
